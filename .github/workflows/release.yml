name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish (for example v1.0.13)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/release-publish.yml
    with:
      release_tag: ${{ inputs.release_tag || github.ref_name }}
    secrets: inherit
