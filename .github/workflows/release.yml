name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/release-publish.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit
