name: Release Publish

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
    secrets:
      VSCE_PAT:
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate release tag matches package version
        run: |
          expected="v$(node -p "require('./package.json').version")"
          actual="${{ inputs.release_tag }}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Release tag ${actual} does not match package version ${expected}."
            exit 1
          fi

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests With Coverage
        run: npm test

      - name: Run Strict Benchmark Gate
        run: npm run benchmark:strict

      - name: Build VSIX
        run: npm run build

      - name: Resolve VSIX path
        id: vsix
        run: |
          vsix_path="$(ls -1 java-message-key-navigator-*.vsix | head -n 1)"
          if [ -z "${vsix_path}" ]; then
            echo "::error::VSIX package was not generated."
            exit 1
          fi
          echo "path=${vsix_path}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ inputs.release_tag }}" >/dev/null 2>&1 || \
          gh release create "${{ inputs.release_tag }}" --verify-tag --generate-notes

      - name: Upload VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" "${{ steps.vsix.outputs.path }}" --clobber

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npm run deploy -- --packagePath "${{ steps.vsix.outputs.path }}" --skip-duplicate
